<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrinho 2026 - Campo e Cidade Conectados</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#87CEEB;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    margin:15px;
    color:#1f4d1f;
}

#info{
    font-size:22px;
    margin-bottom:10px;
}

canvas{
    background:#9bd770;
    border:4px solid #2d572c;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>🌱 Agrinho 2026 - Campo e Cidade Conectados 🏙️</h1>
<div id="info">
    Pontos: <span id="score">0</span>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;

const player = {
    x: 100,
    y: 220,
    size: 35,
    speed: 5,
    carrying: false
};

const food = {
    x: 150,
    y: 250,
    size: 25
};

const city = {
    x: 760,
    y: 180,
    w: 100,
    h: 140
};

const keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

function drawBackground(){

    // Céu
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0,0,900,500);

    // Campo
    ctx.fillStyle = "#7ec850";
    ctx.fillRect(0,0,450,500);

    // Cidade
    ctx.fillStyle = "#d9d9d9";
    ctx.fillRect(450,0,450,500);

    // Estrada
    ctx.fillStyle = "#555";
    ctx.fillRect(425,0,50,500);

    // Plantações
    ctx.fillStyle = "#4CAF50";

    for(let i=40;i<400;i+=60){
        for(let j=50;j<450;j+=60){
            ctx.beginPath();
            ctx.arc(i,j,10,0,Math.PI*2);
            ctx.fill();
        }
    }

    // Prédios
    ctx.fillStyle = "#888";

    ctx.fillRect(550,180,70,140);
    ctx.fillRect(650,140,80,180);
    ctx.fillRect(760,120,90,200);
}

function drawFood(){
    if(!player.carrying){
        ctx.font = "28px Arial";
        ctx.fillText("🍅", food.x, food.y);
    }
}

function drawCityTarget(){
    ctx.strokeStyle = "gold";
    ctx.lineWidth = 4;
    ctx.strokeRect(city.x, city.y, city.w, city.h);

    ctx.fillStyle = "black";
    ctx.font = "18px Arial";
    ctx.fillText("Mercado", city.x+8, city.y-10);
}

function drawPlayer(){
    ctx.font = "34px Arial";
    ctx.fillText("🧑‍🌾", player.x, player.y);

    if(player.carrying){
        ctx.fillText("🍅", player.x+20, player.y-15);
    }
}

function collision(a,b){
    return (
        a.x < b.x + b.size &&
        a.x + a.size > b.x &&
        a.y < b.y + b.size &&
        a.y + a.size > b.y
    );
}

function update(){

    if(keys["ArrowUp"] || keys["w"])
        player.y -= player.speed;

    if(keys["ArrowDown"] || keys["s"])
        player.y += player.speed;

    if(keys["ArrowLeft"] || keys["a"])
        player.x -= player.speed;

    if(keys["ArrowRight"] || keys["d"])
        player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width-40, player.x));
    player.y = Math.max(35, Math.min(canvas.height-10, player.y));

    if(!player.carrying && collision(player, food)){
        player.carrying = true;
    }

    if(player.carrying &&
        player.x > city.x &&
        player.x < city.x + city.w &&
        player.y > city.y &&
        player.y < city.y + city.h){

        score++;
        document.getElementById("score").textContent = score;

        player.carrying = false;

        food.x = 50 + Math.random()*320;
        food.y = 50 + Math.random()*350;
    }
}

function draw(){
    drawBackground();
    drawFood();
    drawCityTarget();
    drawPlayer();
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
