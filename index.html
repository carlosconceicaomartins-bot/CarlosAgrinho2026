<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrinho 2026 - Campo e Cidade</title>

<style>
body{
    margin:0;
    background:#dff4d8;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    color:#2e7d32;
}

#ui{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:10px;
    font-weight:bold;
}

canvas{
    border:4px solid #2e7d32;
    background:#8fd175;
}
</style>
</head>
<body>

<h1>🌱 Agrinho 2026 - Campo e Cidade 🏙️</h1>

<div id="ui">
    <div>💰 Dinheiro: <span id="money">100</span></div>
    <div>🌽 <span id="cor">0</span></div>
    <div>🍅 <span id="tomato">0</span></div>
    <div>🌾 <span id="wheat">0</span></div>
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let money = 100;

const inventory = {
    corn:0,
    tomato:0,
    wheat:0
};

const crops = {
    corn:{
        emoji:"🌽",
        cost:10,
        speed:2.0
    },
    tomato:{
        emoji:"🍅",
        cost:15,
        speed:2.5
    },
    soy:{
    emoji:"🌾",
    cost:20,
    speed:3.0
}
};

const player = {
    x:120,
    y:400,
    size:35,
    speed:4
};

const city = {
    x:760,
    y:120,
    w:180,
    h:260
};

const farm = [];

const rows = 3;
const cols = 5;

const startX = 80;
const startY = 80;

const tileSize = 90;
const gap = 15;

for(let row=0; row<rows; row++){

    for(let col=0; col<cols; col++){

        farm.push({
            x:startX + col*(tileSize+gap),
            y:startY + row*(tileSize+gap),
            crop:null,
            progress:0
        });

    }
}

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

canvas.addEventListener("click", e=>{

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    farm.forEach(plot=>{

        if(
            mx > plot.x &&
            mx < plot.x + tileSize &&
            my > plot.y &&
            my < plot.y + tileSize &&
            !plot.crop
        ){

            let choice = prompt(
`Escolha:

1 - Milho (R$10)
2 - Tomate (R$15)
3 - Trigo (R$20)`
);

            let cropType = null;

            if(choice==="1") cropType="corn";
            if(choice==="2") cropType="tomato";
            if(choice==="3") cropType="wheat";

            if(!cropType) return;

            if(money < crops[cropType].cost){

                alert("Dinheiro insuficiente!");
                return;
            }

            money -= crops[cropType].cost;

            plot.crop = cropType;
            plot.progress = 0;

            updateUI();
        }
    });
});

function updateUI(){

    document.getElementById("money").textContent = money;
    document.getElementById("corn").textContent = inventory.corn;
    document.getElementById("tomato").textContent = inventory.tomato;
    document.getElementById("wheat").textContent = inventory.wheat;
}

let order;

function generateOrder(){

    order = {
        corn:Math.floor(Math.random()*3),
        tomato:Math.floor(Math.random()*3),
        wheat:Math.floor(Math.random()*2),
        reward:50 + Math.floor(Math.random()*120)
    };
}

generateOrder();

function movePlayer(){

    if(keys["w"] || keys["ArrowUp"])
        player.y -= player.speed;

    if(keys["s"] || keys["ArrowDown"])
        player.y += player.speed;

    if(keys["a"] || keys["ArrowLeft"])
        player.x -= player.speed;

    if(keys["d"] || keys["ArrowRight"])
        player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width-40, player.x));
    player.y = Math.max(35, Math.min(canvas.height-10, player.y));
}

function growCrops(){

    farm.forEach(plot=>{

        if(plot.crop && plot.progress < 100){

            plot.progress += crops[plot.crop].speed;

            if(plot.progress > 100)
                plot.progress = 100;
        }
    });
}

function harvestCrops(){

    farm.forEach(plot=>{

        if(!plot.crop) return;

        if(plot.progress < 100) return;

        if(
            player.x < plot.x + tileSize &&
            player.x + player.size > plot.x &&
            player.y < plot.y + tileSize &&
            player.y + player.size > plot.y
        ){

            inventory[plot.crop]++;

            plot.crop = null;
            plot.progress = 0;

            updateUI();
        }
    });
}

function deliverOrder(){

    if(
        player.x > city.x &&
        player.x < city.x + city.w &&
        player.y > city.y &&
        player.y < city.y + city.h
    ){

        if(
            inventory.corn >= order.corn &&
            inventory.tomato >= order.tomato &&
            inventory.wheat >= order.wheat
        ){

            inventory.corn -= order.corn;
            inventory.tomato -= order.tomato;
            inventory.wheat -= order.wheat;

            money += order.reward;

            alert("Pedido entregue! +" + order.reward);

            generateOrder();
            updateUI();

            if(money >= 1000){

                alert(
                    "🏆 PARABÉNS!\n\nVocê conectou o campo e a cidade e venceu!"
                );
            }
        }
    }
}

function drawFarm(){

    farm.forEach(plot=>{

        ctx.fillStyle = "#8d6e63";
        ctx.fillRect(plot.x, plot.y, tileSize, tileSize);

        ctx.strokeStyle = "#5d4037";
        ctx.strokeRect(plot.x, plot.y, tileSize, tileSize);

        if(plot.crop){

            ctx.font = "32px Arial";

            if(plot.progress >= 100){

                ctx.fillText(
                    "✅",
                    plot.x + 25,
                    plot.y + 55
                );

            }else{

                ctx.fillText(
                    crops[plot.crop].emoji,
                    plot.x + 25,
                    plot.y + 55
                );

                ctx.fillStyle = "green";

                ctx.fillRect(
                    plot.x + 5,
                    plot.y + 75,
                    (plot.progress/100)*80,
                    8
                );
            }
        }
    });
}

function drawCity(){

    ctx.fillStyle = "#cfcfcf";
    ctx.fillRect(city.x, city.y, city.w, city.h);

    ctx.strokeStyle = "#555";
    ctx.strokeRect(city.x, city.y, city.w, city.h);

    ctx.fillStyle = "black";
    ctx.font = "24px Arial";
    ctx.fillText("🏙️ Cidade", city.x+25, city.y+40);

    ctx.font = "18px Arial";

    ctx.fillText(
        `🌽 ${order.corn}`,
        city.x+20,
        city.y+90
    );

    ctx.fillText(
        `🍅 ${order.tomato}`,
        city.x+20,
        city.y+125
    );

    ctx.fillText(
        `🌾 ${order.wheat}`,
        city.x+20,
        city.y+160
    );

    ctx.fillText(
        `💰 R$${order.reward}`,
        city.x+20,
        city.y+210
    );

    ctx.fillText(
        "Entre aqui",
        city.x+20,
        city.y+245
    );
}

function drawPlayer(){

    ctx.font = "36px Arial";
    ctx.fillText("🤠", player.x, player.y);

}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawFarm();
    drawCity();
    drawPlayer();
}

function gameLoop(){

    movePlayer();
    growCrops();
    harvestCrops();
    deliverOrder();

    draw();

    requestAnimationFrame(gameLoop);
}

updateUI();
gameLoop();

</script>

</body>
</html>
