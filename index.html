<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Agrinho 2026: Guardião do Campo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f5e9;
            color: #2e7d32;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 3px solid #4caf50;
        }

        h1 {
            color: #1b5e20;
            margin-top: 0;
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .question {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #388e3c;
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .correct { color: #2e7d32; }
        .wrong { color: #d32f2f; }

        .hidden {
            display: none;
        }

        .btn-restart {
            background-color: #1565c0;
            margin-top: 20px;
        }
        .btn-restart:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Agrinho 2026</h1>
        <p><em>Desafio do Conhecimento do Campo</em></p>
        <hr style="border: 1px solid #4caf50; margin-bottom: 20px;">

        <div id="game-screen">
            <div class="score-board">Pontuação: <span id="score">0</span></div>
            <div class="question" id="question-text">Carregando pergunta...</div>
            <div class="options-container" id="options-box">
                </div>
