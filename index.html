<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Agrinho: Missão Sustentável</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #e0f2f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            margin-bottom: 15px;
            text-align: center;
            max-width: 500px;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            background: linear-gradient(to bottom, #87CEEB 70%, #8B5A2B 30%);
            border: 4px solid #2e7d32;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #agrinho {
            position: absolute;
            bottom: 30px;
            left: 270px;
            width: 50px;
            height: 60px;
            background-color: #ffeb3b; /* Corpo (chapéu de palha/amarelo) */
            border-radius: 10px 10px 0 0;
            border: 3px solid #2e7d32;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #2e7d32;
            transition: left 0.1s ease-out;
        }
        /* Detalhe do macacão do Agrinho */
        #agrinho::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background-color: #1565c0; /* Macacão Azul */
            border-radius: 5px 5px 0 0;
        }

            position: absolute;
            width: 30px;
            height: 30px;
