<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Agrinho: Missão Sustentável</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #e0f2f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            margin-bottom: 15px;
            text-align: center;
            max-width: 500px;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            background: linear-gradient(to bottom, #87CEEB 70%, #8B5A2B 30%);
            border: 4px solid #2e7d32;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #agrinho {
            position: absolute;
            bottom: 30px;
            left: 270px;
            width: 50px;
            height: 60px;
            background-color: #ffeb3b; /* Corpo (chapéu de palha/amarelo) */
            border-radius: 10px 10px 0 0;
            border: 3px solid #2e7d32;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #2e7d32;
            transition: left 0.1s ease-out;
        }
        /* Detalhe do macacão do Agrinho */
        #agrinho::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background-color: #1565c0; /* Macacão Azul */
            border-radius: 5px 5px 0 0;
        }
        .item {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        #hud {
            width: 600px;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        .controls-hint {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Agrinho: Missão Sustentável</h1>
    <p>Ajude o Agrinho a proteger a natureza! Colete água, sol e plantas. Desvie da poluição e das pragas!</p>

    <div id="game-container">
        <div id="agrinho">🌱</div>
        
        <div id="game-over-screen">
            <h2>Fim de Jogo!</h2>
            <p id="final-score">Pontuação: 0</p>
            <button onclick="resetGame()">Jogar Novamente</button>
        </div>
    </div>

    <div id="hud">
        <div id="score-display">Pontos: 0</div>
        <div id="lives-display">Vidas: ❤️❤️❤️</div>
    </div>

    <div class="controls-hint">
        Use as <strong>Setas Esquerda (←) e Direita (→)</strong> do teclado ou <strong>toque nos lados da tela</strong>.
    </div>

    <script>
        const container = document.getElementById('game-container');
        const agrinho = document.getElementById('agrinho');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScore = document.getElementById('final-score');

        let agrinhoX = 270;
        let score = 0;
        let lives = 3;
        let gameActive = true;
        let items = [];
        let gameSpeed = 3;
        let spawnRate = 0.02; // Chance de surgir um item por frame

        // Tipos de itens: bons (pontos) e ruins (perde vida)
        const itemTypes = [
            { icon: '💧', type: 'good', color: '#e3f2fd' }, // Água
            { icon: '🌱', type: 'good', color: '#e8f5e9' }, // Muda de planta
            { icon: '☀️', type: 'good', color: '#fffde7' }, // Sol
            { icon: '💨', type: 'bad', color: '#b0bec5' },  // Poluição
            { icon: '🐛', type: 'bad', color: '#d1c4e9' }   // Praga
        ];

        // Movimentação do Agrinho
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' && agrinhoX > 0) {
                agrinhoX -= 25;
            } else if (e.key === 'ArrowRight' && agrinhoX < 550) {
                agrinhoX += 25;
            }
            agrinho.style.left = agrinhoX + 'px';
        });

        // Suporte para cliques/toques na tela (para mobile ou mouse)
        container.addEventListener('click', (e) => {
            if (!gameActive) return;
            const rect = container.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            if (clickX < 300 && agrinhoX > 0) {
                agrinhoX -= 35;
            } else if (clickX >= 300 && agrinhoX < 550) {
                agrinhoX += 35;
            }
            agrinho.style.left = agrinhoX + 'px';
        });

        // Função para criar um novo item caindo
        function createItem() {
            if (Math.random() < spawnRate) {
                const randomType = itemTypes[Math.floor(Math.random() * itemTypes.length)];
                const itemEl = document.createElement('div');
                itemEl.classList.add('item');
                itemEl.innerHTML = randomType.icon;
                itemEl.style.backgroundColor = randomType.color;
                
                const startX = Math.floor(Math.random() * 570);
                itemEl.style.left = startX + 'px';
                itemEl.style.top = '0px';
                
                container.appendChild(itemEl);
                
                items.push({
                    element: itemEl,
                    x: startX,
                    y: 0,
                    type: randomType.type
                });
            }
        }

        // Atualizar a posição dos itens e checar colisões
        function updateItems() {
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += gameSpeed;
                item.element.style.top = item.y + 'px';

                // Checa colisão com o Agrinho
                // Agrinho está fixo em Y entre 310 e 370 (bottom 30px em uma tela de 400px)
                if (item.y >= 310 && item.y <= 370 && item.x >= agrinhoX - 20 && item.x <= agrinhoX + 40) {
                    if (item.type === 'good') {
                        score += 10;
                        scoreDisplay.innerText = `Pontos: ${score}`;
                        // Aumenta a velocidade do jogo gradualmente
                        if (score % 50 === 0) gameSpeed += 0.5;
                    } else {
                        lives--;
                        updateLivesDisplay();
                        if (lives <= 0) {
                            endGame();
                        }
                    }
                    item.element.remove();
                    items.splice(i, 1);
                    continue;
                }

                // Remove itens que saíram da tela
                if (item.y > 400) {
                    item.element.remove();
                    items.splice(i, 1);
                }
            }
        }

        function updateLivesDisplay() {
            livesDisplay.innerText = 'Vidas: ' + '❤️'.repeat(lives);
        }

        function endGame() {
            gameActive = false;
            gameOverScreen.style.display = 'flex';
            finalScore.innerText = `Você fez ${score} pontos protegendo o meio ambiente!`;
        }

        function resetGame() {
            // Limpa itens antigos
            items.forEach(item => item.element.remove());
            items = [];
            
            // Reseta variáveis
            score = 0;
            lives = 3;
            gameSpeed = 3;
            agrinhoX = 270;
            gameActive = true;
            
            // Atualiza telas
            agrinho.style.left = agrinhoX + 'px';
            scoreDisplay.innerText = `Pontos: ${score}`;
            updateLivesDisplay();
            gameOverScreen.style.display = 'none';
        }

        // Loop principal do jogo
        function gameLoop() {
            if (gameActive) {
                createItem();
                updateItems();
            }
            requestAnimationFrame(gameLoop);
        }

        // Inicia o loop
        gameLoop();
    </script>
</body>
</html>
