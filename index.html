<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026: Missão Campo Verde</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #1b5e20;
            margin: 5px 0;
            font-size: 1.8rem;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background: linear-gradient(to bottom, #a5d6a7, #81c784);
            border: 4px solid #2e7d32;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Estradas/Linhas divisórias para dar sensação de movimento */
        .line {
            position: absolute;
            width: 4px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.4);
            left: 50%;
            transform: translateX(-50%);
            animation: moveLines 1s linear infinite;
        }
        .line-1 { top: -100px; }
        .line-2 { top: 100px; }
        .line-3 { top: 300px; }

        @keyframes moveLines {
            0% { top: -100px; }
            100% { top: 500px; }
        }

        /* Jogador (Trator Tecnológico) */
        #player {
            position: absolute;
            bottom: 20px;
            left: 175px; /* Posição inicial (meio) */
            width: 50px;
            height: 65px;
            background-color: #2e7d32;
            border-radius: 8px;
            border: 2px solid #1b5e20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: left 0.1s ease-out;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Itens Caindo */
        .item {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            top: -50px;
        }

        /* Painel de Pontos */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #1b5e20;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 20;
        }
