<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrinho 2026 - Campo e Cidade</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#dff5d8;
    text-align:center;
    margin:20px;
}

h1{
    color:#2e7d32;
}

#topo{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin-bottom:20px;
    font-size:18px;
}

#farm{
    width:500px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:5px;
}

.plot{
    width:90px;
    height:90px;
    background:#8d6e63;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    color:white;
    user-select:none;
}

.plot:hover{
    filter:brightness(1.1);
}

#cidade{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:10px;
    display:inline-block;
}

button{
    padding:10px 15px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

#evento{
    margin-top:15px;
    font-size:20px;
    color:#1565c0;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🌱 Agrinho 2026 - Campo e Cidade 🏙️</h1>

<div id="topo">
    <div>💰 Dinheiro: R$ <span id="money">100</span></div>
    <div>🌽 <span id="corn">0</span></div>
    <div>🍅 <span id="tomato">0</span></div>
    <div>🫘 <span id="soy">0</span></div>
</div>

<div id="farm"></div>

<div id="cidade">
    <h2>🏙️ Pedido da Cidade</h2>

    <p>
        🌽 <span id="reqCorn"></span>
        🍅 <span id="reqTomato"></span>
        🫘 <span id="reqSoy"></span>
    </p>

    <p>💵 Recompensa: R$ <span id="reward"></span></p>

    <button onclick="deliver()">Entregar Pedido</button>
</div>

<div id="evento"></div>

<script>

const farm = document.getElementById("farm");

let money = 100;

let inventory = {
    corn:0,
    tomato:0,
    soy:0
};

let growthBonus = 1;

const crops = {
    corn:{
        emoji:"🌽",
        cost:10,
        grow:20
    },
    tomato:{
        emoji:"🍅",
        cost:15,
        grow:15
    },
    soy:{
        emoji:"🫘",
        cost:20,
        grow:10
    }
};

let plots = [];

for(let i=0;i<25;i++){

    let div = document.createElement("div");
    div.className="plot";

    plots.push({
        crop:null,
        progress:0,
        element:div
    });

    div.onclick=()=>plant(i);

    farm.appendChild(div);
}

function plant(index){

    const choice = prompt(
`O que deseja plantar?

1 - Milho (R$10)
2 - Tomate (R$15)
3 - Soja (R$20)`
    );

    let cropType;

    if(choice=="1") cropType="corn";
    else if(choice=="2") cropType="tomato";
    else if(choice=="3") cropType="soy";
    else return;

    let plot = plots[index];

    if(plot.crop) return;

    if(money < crops[cropType].cost){
        alert("Dinheiro insuficiente!");
        return;
    }

    money -= crops[cropType].cost;

    plot.crop = cropType;
    plot.progress = 0;

    updateUI();
}

function updateUI(){

    document.getElementById("money").textContent = money;

    document.getElementById("corn").textContent = inventory.corn;
    document.getElementById("tomato").textContent = inventory.tomato;
    document.getElementById("soy").textContent = inventory.soy;

    plots.forEach(plot=>{

        if(!plot.crop){
            plot.element.innerHTML="";
            return;
        }

        if(plot.progress >= 100){
            plot.element.innerHTML="✅";
        }else{
            plot.element.innerHTML=crops[plot.crop].emoji;
        }
    });
}

setInterval(()=>{

    plots.forEach(plot=>{

        if(!plot.crop) return;

        if(plot.progress < 100){

            plot.progress += crops[plot.crop].grow * growthBonus;

            if(plot.progress > 100)
                plot.progress = 100;

        }
    });

    updateUI();

},1000);

plots.forEach(plot=>{

    plot.element.addEventListener("dblclick",()=>{

        if(plot.crop && plot.progress >= 100){

            inventory[plot.crop]++;

            plot.crop=null;
            plot.progress=0;

            updateUI();
        }

    });

});

let order;

function newOrder(){

    order={
        corn:Math.floor(Math.random()*3),
        tomato:Math.floor(Math.random()*3),
        soy:Math.floor(Math.random()*2),
        reward:50+Math.floor(Math.random()*100)
    };

    document.getElementById("reqCorn").textContent=order.corn;
    document.getElementById("reqTomato").textContent=order.tomato;
    document.getElementById("reqSoy").textContent=order.soy;
    document.getElementById("reward").textContent=order.reward;
}

function deliver(){

    if(
        inventory.corn >= order.corn &&
        inventory.tomato >= order.tomato &&
        inventory.soy >= order.soy
    ){

        inventory.corn -= order.corn;
        inventory.tomato -= order.tomato;
        inventory.soy -= order.soy;

        money += order.reward;

        alert("Pedido entregue!");

        if(money >= 1000){
            alert("🏆 Parabéns! Você conectou o campo e a cidade e venceu!");
        }

        newOrder();
        updateUI();

    }else{
        alert("Você não possui produtos suficientes.");
    }
}

function randomEvent(){

    const eventBox = document.getElementById("evento");

    if(Math.random()<0.5){

        growthBonus = 1.3;

        eventBox.innerHTML="🌧️ Chuva! Crescimento acelerado.";

    }else{

        growthBonus = 0.7;

        eventBox.innerHTML="☀️ Seca! Crescimento reduzido.";

    }

    setTimeout(()=>{
        growthBonus=1;
        eventBox.innerHTML="";
    },10000);
}

setInterval(randomEvent,30000);

newOrder();
updateUI();

</script>

</body>
</html>
